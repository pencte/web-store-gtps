<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
</head>

<body>

<h2>LOGIN ADMIN</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<div id="panel" style="display:none;">
  <h2>ORDERS</h2>
  <div id="orders"></div>
</div>

<script>
// 🔁 GANTI SAMA NGROK / VPS
const API = "https://YOUR-NGROK-URL.ngrok.io";

let token="";

async function login(){
  let username = document.getElementById("user").value;
  let password = document.getElementById("pass").value;

  let res = await fetch(API + "/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ username, password })
  });

  let data = await res.json();

  if(data.success){
    token = data.token;
    document.getElementById("panel").style.display="block";
    loadOrders();
  } else {
    alert("Login gagal!");
  }
}

async function loadOrders(){
  let res = await fetch(API + "/orders", {
    headers:{ authorization: token }
  });

  let data = await res.json();

  let html="";

  data.reverse().forEach(o=>{
    html += `
      <div>
        <b>${o.username}</b> - ${o.item} - ${o.status}<br>
        <img src="${API}/uploads/${o.bukti}" width="120"><br>
        <button onclick="update(${o.id},'approved')">Approve</button>
        <button onclick="update(${o.id},'rejected')">Reject</button>
      </div><hr>
    `;
  });

  document.getElementById("orders").innerHTML=html;
}

async function update(id,status){
  await fetch(API + "/update-status",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      authorization: token
    },
    body: JSON.stringify({ id, status })
  });

  loadOrders();
}
</script>

</body>
</html>
